name: ⬇️  05- Group Download

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Group URLs (format: dl:https://example.com/file1.zip dl:https://example.com/file2.pdf dl:https://example.com/file3.mp4)'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          # Configure git for better large file handling
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          # FIX: Added p7zip-full for reliable cross-platform archives (replaces zip for split/password use)
          sudo apt-get install -y aria2 zip p7zip-full curl bc

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS_INPUT="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          # Extract URLs from dl: format
          URLS=$(echo "$URLS_INPUT" | grep -o 'dl:[^[:space:]]*' | sed 's/^dl://')
          
          # REDUCED to 45MB for faster, more reliable pushes
          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          # Create safe backup location for files (survives git operations)
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          echo "AVASAM (https://avasam.ir) - Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (optimized for GitHub)"
          echo "Backup directory: $BACKUP_DIR"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          # Create group downloads folder
          GROUP_FOLDER="group_downloads"
          mkdir -p "downloads/$GROUP_FOLDER"
          BACKUP_TARGET="$BACKUP_DIR/$GROUP_FOLDER"
          mkdir -p "$BACKUP_TARGET"

          mkdir -p downloads tmp_downloads

          # Function for proper URL encoding
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          create_error_file() {
            local FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local COUNTER="$4"
            local FOLDER_NAME="$COUNTER"
            mkdir -p "$BACKUP_TARGET/$FOLDER_NAME"
            {
              echo "# ${FILENAME} - Download Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **File** | \`${FILENAME}\` |"
              echo "| **URL** | ${URL} |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Possible Solutions"
              echo ""
              echo "- Check if the URL is correct and accessible"
              echo "- The file may have been removed or moved"
              echo "- The server may require authentication"
              echo "- For SourceForge: Try using the direct download link"
              echo "- Some servers block automated downloads (403 Forbidden)"
              echo "- Try again later if it is a temporary server issue"
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } > "$BACKUP_TARGET/$FOLDER_NAME/README.md"
            echo "Error file created: $BACKUP_TARGET/$FOLDER_NAME/README.md"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""

            # Clean up any previous partial download
            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"

              # Clean before each attempt
              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL" 2>&1)

              # Check if download was successful AND file has content
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "aria2c download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi

              # aria2c failed, clean up and try curl
              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
              echo "aria2c failed or file empty, trying curl fallback..."

              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "tmp_downloads/$FILENAME" \
                "$URL" 2>&1)

              # Check curl result
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "curl download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi

              # Both failed, clean up
              rm -f "tmp_downloads/$FILENAME"
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            done

            if [ "$SUCCESS" = true ] && [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
              local FINAL_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
              if [ "$FINAL_SIZE" -gt 0 ]; then
                echo "Successfully downloaded: $FILENAME ($FINAL_SIZE bytes)"
                return 0
              fi
            fi

            # Download failed - create error file and clean up
            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
            return 1
          }

          # Process URLs with counter
          COUNTER=1
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            echo "Downloading $URL -> $FILENAME (to folder: $COUNTER)"
            
            # Create folder for this download
            FOLDER_NAME="$COUNTER"
            mkdir -p "$BACKUP_TARGET/$FOLDER_NAME"
            
            if download_with_retry "$URL" "$FILENAME"; then
              # Move downloaded file to its numbered folder
              mv "tmp_downloads/$FILENAME" "$BACKUP_TARGET/$FOLDER_NAME/"
              echo "File saved to: $BACKUP_TARGET/$FOLDER_NAME/$FILENAME"
            else
              create_error_file "$FILENAME" "Download failed after 3 attempts" "$URL" "$COUNTER"
            fi
            
            COUNTER=$((COUNTER + 1))
          done

          rm -rf tmp_downloads

          # Process each folder for archiving based on mode
          if [ "$MODE" = "zip" ]; then
            for FOLDER_PATH in "$BACKUP_TARGET"/*/; do
              [ -d "$FOLDER_PATH" ] || continue
              FOLDER_NAME=$(basename "$FOLDER_PATH")
              
              # Check if folder has files
              if [ -n "$(ls -A "$FOLDER_PATH" 2>/dev/null | grep -v "README.md")" ]; then
                # Create archive
                ARCHIVE_NAME="download_${FOLDER_NAME}"
                
                # Get all files except README.md for archiving
                VALID_FILES=()
                for f in "$FOLDER_PATH"/*; do
                  if [ -f "$f" ] && [ -s "$f" ] && [[ ! "$f" == *"README.md" ]]; then
                    VALID_FILES+=("$f")
                  fi
                done
                
                if [ ${#VALID_FILES[@]} -gt 0 ]; then
                  if [ -n "$ZIP_PASSWORD" ]; then
                    7z a \
                      -p"${ZIP_PASSWORD}" \
                      -mhe=on \
                      -mx=0 \
                      "$FOLDER_PATH/${ARCHIVE_NAME}.7z" \
                      "${VALID_FILES[@]}"
                  else
                    7z a \
                      -mx=0 \
                      "$FOLDER_PATH/${ARCHIVE_NAME}.7z" \
                      "${VALID_FILES[@]}"
                  fi
                  
                  # Remove original files after archiving (keep README.md)
                  for FILE in "${VALID_FILES[@]}"; do
                    rm -f "$FILE"
                  done
                  
                  # Update README.md for this folder
                  ARCHIVE_SIZE=$(stat -c%s "$FOLDER_PATH/${ARCHIVE_NAME}.7z" 2>/dev/null || echo "0")
                  ARCHIVE_SIZE_MB=$(echo "scale=2; $ARCHIVE_SIZE / 1024 / 1024" | bc)
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  ARCHIVE_ENCODED=$(urlencode "${ARCHIVE_NAME}.7z")
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${GROUP_FOLDER}/${FOLDER_ENCODED}/${ARCHIVE_ENCODED}"
                  
                  {
                    echo "# Download ${FOLDER_NAME}"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Information"
                    echo ""
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Archive Name** | \`${ARCHIVE_NAME}.7z\` |"
                    echo "| **Size** | ${ARCHIVE_SIZE_MB} MB |"
                    echo "| **Status** | **Complete (100%)** |"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "| **Password Protected** | **YES** |"
                    else
                      echo "| **Password Protected** | **NO** |"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Link"
                    echo ""
                    echo "| File | Link |"
                    echo "|------|------|"
                    echo "| \`${ARCHIVE_NAME}.7z\` | [Download](${RAW_LINK}) |"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## How to Extract"
                    echo ""
                    echo "1. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)"
                    echo "2. **Right-click** the \`.7z\` file → Extract Here"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "3. Enter the password when prompted"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$FOLDER_PATH/README.md"
                fi
              fi
            done
          else
            # Normal mode - create 7z archive for each file individually
            for FOLDER_PATH in "$BACKUP_TARGET"/*/; do
              [ -d "$FOLDER_PATH" ] || continue
              FOLDER_NAME=$(basename "$FOLDER_PATH")
              
              for FILE in "$FOLDER_PATH"/*; do
                [ -f "$FILE" ] || continue
                
                # Skip README.md
                if [[ "$FILE" == *"README.md" ]]; then
                  continue
                fi
                
                # Skip if already archived
                if [[ "$FILE" == *.7z ]]; then
                  continue
                fi
                
                SIZE=$(stat -c%s "$FILE")
                
                if [ "$SIZE" -le 0 ]; then
                  echo "WARNING: File has zero or invalid size: $FILE"
                  rm -f "$FILE"
                  continue
                fi
                
                BASENAME=$(basename "$FILE")
                BASENAME_NO_EXT="${BASENAME%.*}"
                
                if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                  echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting into ${SPLIT_THRESHOLD_MB}MB parts"
                  
                  ARCHIVE_BASE="$FOLDER_PATH/${BASENAME_NO_EXT}"
                  
                  if [ -n "$ZIP_PASSWORD" ]; then
                    7z a \
                      -v${SPLIT_THRESHOLD_MB}m \
                      -p"${ZIP_PASSWORD}" \
                      -mhe=on \
                      -mx=0 \
                      "${ARCHIVE_BASE}.7z" \
                      "$FILE"
                  else
                    7z a \
                      -v${SPLIT_THRESHOLD_MB}m \
                      -mx=0 \
                      "${ARCHIVE_BASE}.7z" \
                      "$FILE"
                  fi
                  
                  # Remove original file after archiving
                  rm -f "$FILE"
                  
                  PARTS_COUNT=$(ls "$FOLDER_PATH/"*.7z* 2>/dev/null | wc -l)
                  
                  # Calculate total size
                  TOTAL_SIZE=0
                  for part_file in "$FOLDER_PATH"/*.7z*; do
                    if [ -f "$part_file" ]; then
                      PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                      TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                    fi
                  done
                  TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
                  
                  # Build download links
                  DOWNLOAD_LINKS_MD=""
                  LINK_NUM=0
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  for part_file in $(ls "$FOLDER_PATH/"*.7z* 2>/dev/null | sort); do
                    if [ -f "$part_file" ]; then
                      PART_BASENAME=$(basename "$part_file")
                      PART_ENCODED=$(urlencode "${PART_BASENAME}")
                      RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${GROUP_FOLDER}/${FOLDER_ENCODED}/${PART_ENCODED}"
                      LINK_NUM=$((LINK_NUM + 1))
                      DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                    fi
                  done
                  
                  {
                    printf '%s\n' "# ${BASENAME_NO_EXT}"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                    printf '%s\n' "| **Total Size** | **${PARTS_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      printf '%s\n' "| **Password Protected** | **YES** |"
                    else
                      printf '%s\n' "| **Password Protected** | **NO** |"
                    fi
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Links"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s' "${DOWNLOAD_LINKS_MD}"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## How to Extract"
                    printf '%s\n' ""
                    printf '%s\n' "1. **Download** all parts (e.g. \`.7z.001\`, \`.7z.002\`...)"
                    printf '%s\n' "2. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)"
                    printf '%s\n' "3. **Right-click** the \`.7z.001\` file → Extract Here"
                    printf '%s\n' "4. All parts combine automatically into the original file"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      printf '%s\n' "5. Enter the password when prompted"
                    fi
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$FOLDER_PATH/README.md"
                  
                else
                  echo "$BASENAME - creating 7z archive in folder: $FOLDER_PATH"
                  
                  if [ -n "$ZIP_PASSWORD" ]; then
                    7z a \
                      -p"${ZIP_PASSWORD}" \
                      -mhe=on \
                      -mx=0 \
                      "$FOLDER_PATH/${BASENAME_NO_EXT}.7z" \
                      "$FILE"
                  else
                    7z a \
                      -mx=0 \
                      "$FOLDER_PATH/${BASENAME_NO_EXT}.7z" \
                      "$FILE"
                  fi
                  
                  # Remove original file after archiving
                  rm -f "$FILE"
                  
                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  FILE_ENCODED=$(urlencode "${BASENAME_NO_EXT}.7z")
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${GROUP_FOLDER}/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  
                  {
                    printf '%s\n' "# ${BASENAME_NO_EXT}"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                    printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      printf '%s\n' "| **Password Protected** | **YES** |"
                    else
                      printf '%s\n' "| **Password Protected** | **NO** |"
                    fi
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' ""
                    printf '%s\n' "| File | Link |"
                    printf '%s\n' "|------|------|"
                    printf '%s\n' "| \`${BASENAME_NO_EXT}.7z\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## How to Extract"
                    printf '%s\n' ""
                    printf '%s\n' "1. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)"
                    printf '%s\n' "2. **Right-click** the \`.7z\` file → Extract Here"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      printf '%s\n' "3. Enter the password when prompted"
                    fi
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$FOLDER_PATH/README.md"
                fi
              done
            done
          fi

          # Debug: Show backup contents
          echo ""
          echo "===== Backup folder contents ====="
          find "$BACKUP_TARGET" -type f | head -50

      - name: Update README.md with download links
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

          GROUP_FOLDER="group_downloads"
          
          # Copy backup files to downloads folder
          mkdir -p downloads
          if [ -d "$BACKUP_DIR/$GROUP_FOLDER" ] && [ "$(ls -A $BACKUP_DIR/$GROUP_FOLDER 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR/$GROUP_FOLDER" downloads/ 2>/dev/null || true
          fi

          SCAN_DIR="downloads/$GROUP_FOLDER"
          
          if [ ! -d "$SCAN_DIR" ]; then
            echo "No folders found in $SCAN_DIR"
            exit 0
          fi

          FOLDERS=$(find "$SCAN_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort -n)

          if [ -z "$FOLDERS" ]; then
            echo "No folders found in $SCAN_DIR"
            exit 0
          fi

          # Function for URL encoding
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Create README.md inside group_downloads folder
          README_PATH="downloads/$GROUP_FOLDER/README.md"
          {
            echo "# Group Downloads"
            echo ""
            echo "Downloaded items:"
            echo ""
            echo "| # | Folder |"
            echo "|---|--------|"
            COUNTER=1
            for FOLDER in $FOLDERS; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "| ${COUNTER} | [${FOLDER}](./${FOLDER_ENCODED}) |"
                COUNTER=$((COUNTER + 1))
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > "$README_PATH"

          echo "$README_PATH created with list of downloaded files"

          # Update root README.md
          SECTION_TITLE="فایل های دانلود گروهی در گیتهاب شما :"

          if [ ! -f "README.md" ]; then
            echo "# AVASAM Downloader" > README.md
            echo "" >> README.md
            echo "https://avasam.ir" >> README.md
            echo "" >> README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            GROUP_ENCODED=$(urlencode "$GROUP_FOLDER")
            echo "- [Group Downloads Folder]($REPO_URL/$GROUP_ENCODED)"
            echo ""
            echo "---"
          } >> README.md

          echo "README.md updated with download links"

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          GROUP_FOLDER="group_downloads"
          SOURCE_DIR="$BACKUP_DIR/$GROUP_FOLDER"

          echo "AVASAM (https://avasam.ir) - Incremental Push Mode"
          echo "This method pushes files in batches to avoid timeout issues"
          echo ""

          # Check backup has files
          BACKUP_FILE_COUNT=$(find "$SOURCE_DIR" -type f 2>/dev/null | wc -l)
          echo "Total files to push: $BACKUP_FILE_COUNT"

          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "No files in backup directory, checking downloads folder..."
            DOWNLOAD_FILE_COUNT=$(find "downloads/$GROUP_FOLDER" -type f 2>/dev/null | wc -l)
            if [ "$DOWNLOAD_FILE_COUNT" -eq 0 ]; then
              echo "Nothing to push"
              exit 0
            fi
          fi

          # Function for URL encoding
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Function to regenerate master README from all folders
          regenerate_downloads_readme() {
            DOWNLOADS_README="downloads/$GROUP_FOLDER/README.md"
            SCAN_DIR="downloads/$GROUP_FOLDER"

            echo "Regenerating downloads README at $DOWNLOADS_README..."

            # Start fresh README
            {
              echo "# Group Downloads"
              echo ""
              echo "Downloaded items:"
              echo ""
              echo "| # | Folder |"
              echo "|---|--------|"
            } > "$DOWNLOADS_README"

            # Add all existing download folders sorted numerically
            COUNTER=1
            for folder in $(ls -d "$SCAN_DIR"/*/ 2>/dev/null | sort -V); do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              printf -- "| %s | [%s](./%s) |\n" "$COUNTER" "$FOLDER_NAME" "$FOLDER_ENCODED" >> "$DOWNLOADS_README"
              COUNTER=$((COUNTER + 1))
            done

            {
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } >> "$DOWNLOADS_README"

            echo "Downloads README regenerated"
          }

          # Function to push files in small batches
          push_batch() {
            local BATCH_SIZE=3
            local FILES=("$@")
            local BATCH_COUNT=0
            local BATCH_FILES=()
            local TOTAL_PUSHED=0
            local TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              BATCH_FILES+=("$FILE")
              BATCH_COUNT=$((BATCH_COUNT + 1))

              if [ $BATCH_COUNT -ge $BATCH_SIZE ]; then
                TOTAL_PUSHED=$((TOTAL_PUSHED + BATCH_COUNT))
                echo ""
                echo ">>> Pushing batch ($TOTAL_PUSHED/$TOTAL_FILES files)..."

                git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                git reset --hard origin/"$BRANCH" 2>/dev/null || true

                mkdir -p downloads
                cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true

                for BF in "${BATCH_FILES[@]}"; do
                  git add "$BF" 2>/dev/null || true
                done

                if ! git diff --cached --quiet 2>/dev/null; then
                  git commit -m "[AVASAM] Add batch of $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true

                  local PUSH_RETRY=0
                  local PUSH_SUCCESS=false
                  while [ $PUSH_RETRY -lt 5 ]; do
                    PUSH_RETRY=$((PUSH_RETRY + 1))
                    if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                      PUSH_SUCCESS=true
                      echo "    Batch pushed successfully!"
                      break
                    else
                      echo "    Batch push failed, attempt $PUSH_RETRY/5..."
                      git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                      git reset --hard origin/"$BRANCH" 2>/dev/null || true
                      mkdir -p downloads
                      cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true
                      for BF in "${BATCH_FILES[@]}"; do
                        git add "$BF" 2>/dev/null || true
                      done
                      if ! git diff --cached --quiet 2>/dev/null; then
                        git commit -m "[AVASAM] Add batch of $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true
                      fi
                      sleep $((3 + RANDOM % 7))
                    fi
                  done

                  if [ "$PUSH_SUCCESS" = false ]; then
                    echo "    WARNING: Batch push failed after 5 attempts"
                  fi
                fi

                BATCH_FILES=()
                BATCH_COUNT=0
                sleep 2
              fi
            done

            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              TOTAL_PUSHED=$((TOTAL_PUSHED + ${#BATCH_FILES[@]}))
              echo ""
              echo ">>> Pushing final batch ($TOTAL_PUSHED/$TOTAL_FILES files)..."

              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p downloads
              cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true

              for BF in "${BATCH_FILES[@]}"; do
                git add "$BF" 2>/dev/null || true
              done

              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "[AVASAM] Add final batch [skip ci]" --quiet 2>/dev/null || true

                local PUSH_RETRY=0
                while [ $PUSH_RETRY -lt 5 ]; do
                  PUSH_RETRY=$((PUSH_RETRY + 1))
                  if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                    echo "    Final batch pushed successfully!"
                    break
                  else
                    echo "    Push failed, attempt $PUSH_RETRY/5..."
                    sleep $((3 + RANDOM % 7))
                    git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                    git reset --hard origin/"$BRANCH" 2>/dev/null || true
                    mkdir -p downloads
                    cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true
                    for BF in "${BATCH_FILES[@]}"; do
                      git add "$BF" 2>/dev/null || true
                    done
                    if ! git diff --cached --quiet 2>/dev/null; then
                      git commit -m "[AVASAM] Add final batch [skip ci]" --quiet 2>/dev/null || true
                    fi
                  fi
                done
              fi
            fi
          }

          # ============================================
          # MAIN INCREMENTAL PUSH LOGIC
          # ============================================

          echo ""
          echo "=========================================="
          echo "Starting incremental push process..."
          echo "=========================================="

          echo "Syncing with remote repository..."
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p "downloads/$GROUP_FOLDER"
          cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true

          echo "Analyzing files to push..."
          ALL_FILES=()

          SCAN_DIR="downloads/$GROUP_FOLDER"

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find "$SCAN_DIR" -name "README.md" -print0 2>/dev/null)

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find "$SCAN_DIR" -type f \( -name "*.7z" -o -name "*.7z.[0-9]*" -o -name "*.mp4" -o -name "*.mp3" -o -name "*.m4a" -o -name "*.exe" -o -name "*.iso" -o -name "*.tar*" -o -name "*.rar" \) -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Found $TOTAL_FILES files to push"
          echo ""

          if [ $TOTAL_FILES -eq 0 ]; then
            git add README.md "downloads/$GROUP_FOLDER/README.md" 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "[AVASAM] Update README [skip ci]"
              timeout 120 git push origin HEAD:"$BRANCH" || true
            fi
            echo "No download files to push!"
            exit 0
          fi

          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            if [ -f "$F" ]; then
              FSIZE=$(stat -c%s "$F" 2>/dev/null || echo 0)
              TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
            fi
          done
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "Total size: ${TOTAL_SIZE_MB}MB"
          echo ""

          if [ $TOTAL_SIZE_MB -lt 100 ]; then
            echo "Small upload - pushing all at once..."

            git add -A "$SCAN_DIR/"
            git add README.md

            if ! git diff --cached --quiet; then
              git commit -m "[AVASAM] Downloaded files [skip ci]"

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 10 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 300 git push origin HEAD:"$BRANCH"; then
                  echo "Push successful!"
                  break
                else
                  echo "Push failed, retry $PUSH_RETRY/10..."
                  sleep $((3 + RANDOM % 7))
                  git fetch origin "$BRANCH"
                  git reset --hard origin/"$BRANCH"
                  mkdir -p "downloads/$GROUP_FOLDER"
                  cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true
                  git add -A "$SCAN_DIR/"
                  git add README.md
                  if ! git diff --cached --quiet; then
                    git commit -m "[AVASAM] Downloaded files [skip ci]"
                  fi
                fi
              done
            fi

          else
            echo "Large upload (${TOTAL_SIZE_MB}MB) - using incremental batch push..."
            echo ""

            push_batch "${ALL_FILES[@]}"

            echo ""
            echo "Pushing README files..."
            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p "downloads/$GROUP_FOLDER"
            cp -r "$SOURCE_DIR"/* "downloads/$GROUP_FOLDER/" 2>/dev/null || true

            regenerate_downloads_readme
            git add "downloads/$GROUP_FOLDER/README.md"
            git add README.md

            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "[AVASAM] Update download list [skip ci]" --quiet 2>/dev/null || true

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 5 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
                  echo "README pushed!"
                  break
                else
                  echo "README push failed, retry $PUSH_RETRY/5..."
                  sleep 3
                fi
              done
            fi
          fi

          echo ""
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "AVASAM (https://avasam.ir)"
          echo "=========================================="
